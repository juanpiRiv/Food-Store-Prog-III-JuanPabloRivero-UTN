<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro | Food Store</title>
    <link rel="stylesheet" href="/css/login.css" />
  </head>
  <body class="page-auth">
    <main class="login-container">
      <section class="login-card">
        <h1>Food Store</h1>
        <p class="subtitle">Crear cuenta</p>

        <p id="form-message" class="form-message" hidden></p>

        <form id="form-registro" action="#" method="post">
          <div class="form-group">
            <label for="email">Email:</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="tucorreo@ejemplo.com"
              required
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label for="password">Contraseña:</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Mínimo 8 caracteres"
              required
              minlength="8"
              autocomplete="new-password"
            />
          </div>

          <div class="form-group">
            <label for="confirm">Repetir contraseña:</label>
            <input
              type="password"
              id="confirm"
              name="confirm"
              required
              minlength="8"
              autocomplete="new-password"
            />
          </div>

          <button type="submit">Registrarme</button>
        </form>

        <p class="register-text">
          ¿Ya tenés cuenta?
          <a id="link-login" href="../login/login.html">Iniciar sesión</a>
        </p>
      </section>
    </main>
    <script type="module" src="./registro.ts"></script>
  </body>
</html>
